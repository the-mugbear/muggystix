[alembic]
script_location = alembic
prepend_sys_path = .
# v2.68.0 — silences the "No path_separator found in configuration"
# DeprecationWarning.  `os` resolves to os.pathsep at runtime, which
# on linux/macOS is `:` and on Windows is `;`.  Matches alembic's
# documented modern default.
path_separator = os

# Database URL is read from app.core.config in env.py, not here.
# This placeholder is overridden at runtime.
sqlalchemy.url = postgresql://localhost/networkMapper

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
