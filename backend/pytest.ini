[pytest]
testpaths = tests
# Put the backend root on sys.path so `import app...` resolves
# regardless of how/where pytest is invoked.
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
asyncio_mode = auto
# v2.69.0 — the conftest test-isolation pattern joins each test's
# session to an outer transaction + a SAVEPOINT (connection.begin_nested,
# conftest.py:246), restarting the savepoint via an after_transaction_end
# listener so service-level commits roll back cleanly at teardown.  When
# code-under-test ALSO uses savepoints (host_deduplication_service's
# begin_nested) and then calls db.commit() (parsers, test_plans complete),
# SQLAlchemy emits "nested transaction already deassociated from
# connection" — a benign artifact of the doubled savepoint nesting that
# does NOT occur in production (real sessions have no artificial outer
# savepoint).  Filtered narrowly by message so a genuinely new SAWarning
# still surfaces.  If the conftest isolation pattern is ever reworked to
# avoid the doubled savepoint, drop this line and confirm the warning is
# gone.
filterwarnings =
    ignore:nested transaction already deassociated from connection:sqlalchemy.exc.SAWarning