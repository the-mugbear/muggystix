# SSL-enabled Nginx configuration for NetworkMapper
# This file provides HTTPS support with security best practices

# HTTP port 80 is completely disabled for security
# Only HTTPS (port 443) is available

# Use Docker's embedded DNS so nginx re-resolves on every request.
# Without this, nginx caches the backend IP at startup and breaks
# when the backend container is recreated with a new IP.
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTPS server configuration
server {
    listen 443 ssl;
    listen 3000 ssl;
    http2 on;
    server_name _;

    # Root directory for React app
    root /usr/share/nginx/html;
    index index.html;

    # SSL Certificate Configuration
    ssl_certificate /etc/ssl/certs/networkmapper.crt;
    ssl_certificate_key /etc/ssl/private/networkmapper.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling (if using CA-signed certificates)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP — script-src is tight here so a future XSS sink in the React app
    # can't execute injected JS. style-src keeps 'unsafe-inline' because
    # MUI/emotion injects inline styles. The FastAPI Swagger /docs and
    # /redoc endpoints re-relax CSP locally — see those location blocks.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'none'; form-action 'self';" always;

    # Remove server version information
    server_tokens off;

    # v2.63.0 — bumped 500M → 2G to support large Nessus exports.
    # Backend MAX_FILE_SIZE in .env must match (default 2 GB).  Above
    # ~2 GB consider chunked upload — browser request memory becomes
    # the next bottleneck.
    client_max_body_size 2G;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Serve React App with proper fallback
    location / {
        try_files $uri $uri/ /index.html;

        # Full security-header set.  nginx drops ALL inherited add_header
        # directives the moment a location declares any of its own, so the
        # server-level set (CSP/HSTS/Referrer/X-XSS included) must be repeated
        # here — otherwise the app HTML ships without CSP, which is exactly the
        # gap the review found.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'none'; form-action 'self';" always;

        # Cache control for HTML files (no cache).  This nested location adds
        # its own headers, so it ALSO drops the parent set and must repeat it —
        # and this is the served index.html, the document CSP actually guards.
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'none'; form-action 'self';" always;
        }
    }

    # Cache static assets with versioning
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;

        # CORS headers for fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # API proxy to backend
    location /api/ {
        # Use a variable so nginx re-resolves via the resolver directive
        # instead of caching the IP from startup.  When proxy_pass uses a
        # variable, nginx does NOT auto-append the URI — we must pass
        # $request_uri explicitly to preserve the full path.
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;

        # Headers for proper proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (if needed for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — sized so a 2 GB upload on a ~5 MB/s link
        # (~400s wall-clock just for body transfer) clears with
        # headroom.  Parse is async via the worker, so these only
        # cover upload-to-disk + the synchronous API response.
        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;

        # Security headers for API responses (CORS is handled by the FastAPI
        # backend).  Full set — see the note in `location /`: a location with
        # any add_header drops the inherited server-level set.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'none';" always;
    }

    # Auth surface — unauthenticated (login, 2fa, password change) and never
    # carries a large body, so cap it tightly.  The server-level 2G cap exists
    # for authenticated scan uploads; without this scoping an unauthenticated
    # client could stream a multi-gigabyte body at /auth/login as a cheap DoS.
    # ``^~`` gives this priority over the broader /api/ prefix.
    location ^~ /api/v1/auth/ {
        client_max_body_size 1m;

        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'none';" always;
    }

    # Liveness — the edge (nginx) is up and serving. Static, no upstream.
    # Use this for "is the web tier process alive" checks that must NOT depend
    # on the backend or DB (e.g. a proxy that should keep routing during a
    # transient backend blip).
    location = /live {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "alive\n";
    }

    # Readiness — proxied to the backend's DB-checking probe so the whole stack
    # (nginx → API → Postgres) must be serving for a 200. A static 200 here
    # previously reported "healthy" even with the API or database down, so a
    # load balancer / uptime monitor never saw an outage. With proxy_pass, an
    # unreachable backend surfaces as 502 and a failed DB probe as 503 — both
    # correctly "not ready". This is what external monitors should poll.
    location = /health {
        access_log off;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/health;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        # Surface the backend's own 503/JSON, not nginx's generic error pages.
        proxy_intercept_errors off;
    }
    # Alias so k8s-style /ready probes work too (same readiness semantics).
    location = /ready {
        access_log off;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/health;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_intercept_errors off;
    }

    # API documentation — proxied to FastAPI's built-in Swagger UI and ReDoc.
    # These endpoints load swagger-ui/redoc from cdn.jsdelivr.net and use
    # inline <script> bootstrap, so CSP is relaxed only here. The global
    # CSP stays tight for the rest of the app.
    # NOTE: nginx drops all inherited add_header directives if any
    # add_header is declared in the location, so security headers are
    # re-declared here.
    location /docs {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://fastapi.tiangolo.com; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    }

    location /redoc {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://fastapi.tiangolo.com; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; worker-src 'self' blob:;" always;
    }

    location /openapi.json {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Agent identity endpoint — must be reachable without auth so
    # agents can verify they're talking to the right NetworkMapper
    # instance before running any commands.  ``^~`` takes priority
    # over the dotfile-deny regex below.
    location ^~ /.well-known/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Rate limiting for API endpoints (optional)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     # ... rest of api location block
    # }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}