name: CI

# Wire the gates that were previously only run locally (ARCHITECTURE.md noted CI
# was not wired) so stale contracts / architecture-boundary violations / failing
# migrations can't ship. Solo-dev pushes straight to main, so this runs on push
# to main as well as PRs.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nmapuser
          POSTGRES_PASSWORD: nmappass
          POSTGRES_DB: networkMapper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nmapuser -d networkMapper"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # conftest derives the "<db>_test" database from DATABASE_URL (or honours
      # TEST_DATABASE_URL); the postgres service has no TLS, so disable sslmode.
      DATABASE_URL: postgresql://nmapuser:nmappass@localhost:5432/networkMapper?sslmode=disable
      DATABASE_SSL_MODE: disable
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Alembic migrations apply cleanly
        run: alembic upgrade head
      - name: Pytest
        # --no-cov: the coverage gate (--cov-fail-under) is a separate tracked
        # item; this job enforces tests + contracts + the service/router boundary.
        run: python -m pytest -q --no-cov

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
