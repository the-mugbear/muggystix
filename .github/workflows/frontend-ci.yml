name: Frontend CI

# Typecheck + unit tests for the React/TypeScript frontend.
# Rationale: `vite build` does NOT run `tsc`, so type errors (e.g. an
# unimported symbol) can otherwise reach a deploy. This gate runs the real
# type checker and the vitest suite on every change to frontend/.

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm run test -- --run
